<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Séjours — V.A.R.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;flex:1">
      <a href="../index.html" class="back-link"><i class="ti ti-arrow-left"></i></a>
      <img src="../icons/logo-vert.png" alt="V.A.R." style="height:28px;width:auto;object-fit:contain;margin-left:4px">
      <div>
        <div id="topbar-title">Séjours</div>
        <div id="topbar-sub">Randonnées itinérantes</div>
      </div>
    </div>
  </div>

  <div id="screen" style="flex:1;overflow-y:auto">
    <div style="background:linear-gradient(160deg,#3A1060,#6B2FAD);padding:20px 16px;text-align:center">
      <i class="ti ti-tent" style="font-size:32px;color:rgba(255,255,255,.8);display:block;margin-bottom:6px"></i>
      <div style="font-size:18px;font-weight:600;color:#fff;margin-bottom:4px">Séjours</div>
      <div style="font-size:12px;color:rgba(255,255,255,.75)">Randonnées itinérantes & voyages</div>
    </div>

    <div id="sejours-list" style="padding:12px 16px;display:flex;flex-direction:column;gap:12px">
      <div style="text-align:center;color:#aaa;font-size:13px;padding:24px">Chargement…</div>
    </div>
  </div>
</div>

<script>
async function init() {
  const url = '../sorties/sejours.json';
  try {
    const r = await fetch(url, { cache: 'no-store' });
    const sejours = await r.json();
    render(sejours);
  } catch(e) {
    document.getElementById('sejours-list').innerHTML =
      '<div style="text-align:center;color:#aaa;font-size:13px;padding:24px">Impossible de charger les séjours.</div>';
  }
}

function fmtDateRange(d1, d2) {
  const mois = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
  const [y1,m1,j1] = d1.split('-');
  const [y2,m2,j2] = d2.split('-');
  if (m1 === m2) return `${parseInt(j1)} au ${parseInt(j2)} ${mois[parseInt(m1)-1]} ${y1}`;
  return `${parseInt(j1)} ${mois[parseInt(m1)-1]} au ${parseInt(j2)} ${mois[parseInt(m2)-1]} ${y1}`;
}

function render(sejours) {
  const list = document.getElementById('sejours-list');
  list.innerHTML = sejours.map(s => `
    <div style="background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden">

      <div style="background:linear-gradient(135deg,#5A1F8C,#8B3FCC);padding:14px 16px">
        <div style="font-size:11px;color:rgba(255,255,255,.75);font-weight:500;margin-bottom:4px">
          <i class="ti ti-calendar-event" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>
          ${fmtDateRange(s.date_debut, s.date_fin)}
        </div>
        <div style="font-size:17px;font-weight:600;color:#fff;line-height:1.3">${s.intitule}</div>
        <div style="font-size:12px;color:rgba(255,255,255,.8);margin-top:3px">
          <i class="ti ti-map-pin" style="font-size:13px;vertical-align:-2px;margin-right:3px"></i>${s.lieu}
        </div>
      </div>

      <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">

        <div style="font-size:13px">
          <div style="font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Hébergement</div>
          <div style="font-weight:500;color:#1a1a18">${s.hebergement}</div>
          ${s.url_hebergement ? `<a href="${s.url_hebergement}" target="_blank" rel="noopener"
            style="font-size:12px;color:#6B2FAD;text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-top:3px">
            <i class="ti ti-external-link" style="font-size:12px"></i> Voir le site
          </a>` : ''}
        </div>

        <div style="background:#F0EBF9;border-radius:8px;padding:10px 12px;font-size:13px">
          <div style="font-size:10px;font-weight:600;color:#5A1F8C;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Tarif</div>
          <div style="font-weight:600;color:#3A1060;font-size:15px">${s.prix}</div>
          <div style="color:#5A1F8C;margin-top:4px;font-size:12px;line-height:1.5">${s.inclus}</div>
        </div>

        ${s.programme ? `
        <div style="font-size:13px">
          <div style="font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Programme</div>
          <div style="color:#555;line-height:1.5">${s.programme}</div>
        </div>` : ''}

        ${s.notes ? `
        <div style="background:#f5f5f0;border-radius:8px;padding:8px 12px;font-size:12px;color:#666;line-height:1.6;font-style:italic">
          ${s.notes}
        </div>` : ''}

        <a href="mailto:bhoyez@gmail.com?subject=Inscription séjour ${encodeURIComponent(s.intitule)}&body=Bonjour,%0D%0A%0D%0AJe souhaite m'inscrire au ${encodeURIComponent(s.intitule)} (${fmtDateRange(s.date_debut, s.date_fin)}).%0D%0A%0D%0APrenom Nom : %0D%0ATéléphone : %0D%0AType de chambre : %0D%0A%0D%0ACordialement"
          style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:13px;font-weight:600;background:#6B2FAD;color:#fff;border-radius:8px;text-decoration:none">
          <i class="ti ti-mail"></i> S'inscrire à ce séjour
        </a>

      </div>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
