<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randonnées passées — V.A.R.</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="../css/galerie.css">
</head>
<body>
<div id="app">

  <div id="topbar">
    <div style="display:flex;align-items:center;gap:10px;flex:1">
      <a href="../index.html" class="back-link"><i class="ti ti-arrow-left"></i></a>
      <img src="../icons/logo-vert.png" alt="V.A.R." style="height:28px;width:auto;object-fit:contain;margin-left:4px">
      <div>
        <div id="topbar-title">Randos passées</div>
        <div id="topbar-sub">Nos sorties</div>
      </div>
    </div>
  </div>

  <!-- VUE 1 : Sélection catégorie -->
  <div id="vue-categories" style="flex:1;overflow-y:auto">
    <div class="page-hero" style="background:linear-gradient(160deg,#085041,#1D9E75);padding:20px 16px;text-align:center;border:none">
      <i class="ti ti-history" style="font-size:32px;color:rgba(255,255,255,.8);display:block;margin-bottom:6px"></i>
      <div style="font-size:18px;font-weight:600;color:#fff;margin-bottom:4px">Randonnées passées</div>
      <div style="font-size:12px;color:rgba(255,255,255,.75)">Revivez nos sorties</div>
    </div>
    <div id="cat-grid" class="cat-grid"></div>
  </div>

  <!-- VUE 2 : Liste des randos d'une catégorie -->
  <div id="vue-randos" style="display:none;flex:1;overflow-y:auto">
    <div class="section-bar">
      <button class="section-back" onclick="showCategories()">
        <i class="ti ti-arrow-left"></i> Catégories
      </button>
      <span id="randos-titre"></span>
    </div>
    <div id="randos-list"></div>
  </div>

  <!-- VUE 3 : Fiche rando passée + carte uMap -->
  <div id="vue-rando" style="display:none;flex:1;flex-direction:column">
    <div class="section-bar">
      <button class="section-back" id="rando-back-btn">
        <i class="ti ti-arrow-left"></i> <span id="rando-back-label"></span>
      </button>
      <span id="rando-titre-bar" style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px"></span>
    </div>

    <!-- Infos synthétiques -->
    <div id="rando-detail-hero" class="rando-past-hero"></div>

    <!-- Stats -->
    <div id="rando-stats" class="stats-row"></div>

    <!-- Résumé -->
    <div id="rando-resume" class="rando-past-resume"></div>

    <!-- Carte uMap -->
    <div class="rando-map-label">
      <i class="ti ti-map-2" style="font-size:14px;vertical-align:-2px;margin-right:5px"></i>
      Tracé sur la carte
    </div>
    <div style="flex:1;min-height:340px;position:relative">
      <iframe id="rando-iframe"
        src=""
        title="Tracé uMap"
        allowfullscreen
        loading="lazy"
        style="width:100%;height:100%;border:none;display:block;min-height:340px">
      </iframe>
    </div>

    <!-- Boutons -->
    <div style="padding:12px 16px;display:flex;gap:8px;background:#fff;border-top:1px solid #eee">
      <a id="rando-umap-link" href="#" target="_blank" rel="noopener"
         style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;font-size:12px;font-weight:500;background:#1D9E75;color:#fff;border:none;border-radius:8px;text-decoration:none">
        <i class="ti ti-external-link"></i> Ouvrir uMap
      </a>
      <a id="rando-album-link" href="#" target="_blank" rel="noopener"
         style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px;font-size:12px;font-weight:500;background:transparent;color:#1D9E75;border:1px solid #1D9E75;border-radius:8px;text-decoration:none">
        <i class="ti ti-photo"></i> Photos
      </a>
    </div>
  </div>

</div>
<script>
const BASE_JSON = '../sorties/randos-passees.json';
let data = [];
let catCourante = null;

async function init() {
  try {
    const r = await fetch(BASE_JSON, { cache: 'no-store' });
    data = await r.json();
    renderCategories();
  } catch(e) {
    document.getElementById('cat-grid').innerHTML =
      '<div style="padding:24px;text-align:center;color:#aaa;font-size:13px;">Impossible de charger les randonnées.</div>';
  }
}

function badgeHtml(d) {
  const map = { facile:['badge-facile','Facile'], moyen:['badge-moyen','Moyen'], difficile:['badge-difficile','Difficile'] };
  const [cls,lbl] = map[d]||['badge-moyen','?'];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function fmtDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  const mois = ['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
  const jours = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const dt = new Date(iso+'T00:00:00');
  return jours[dt.getDay()]+' '+parseInt(d)+' '+mois[parseInt(m)-1]+' '+y;
}

function renderCategories() {
  document.getElementById('cat-grid').innerHTML = data.map(g => `
    <div class="cat-card" onclick="showRandos('${g.categorie}')" style="--cat-color:${g.couleur}">
      <div class="cat-icon"><i class="ti ${g.icone}"></i></div>
      <div class="cat-label">${g.label}</div>
      <div class="cat-count">${g.randos.length} sortie${g.randos.length>1?'s':''}</div>
      <i class="ti ti-chevron-right cat-chevron"></i>
    </div>
  `).join('');
}

function showCategories() {
  document.getElementById('vue-categories').style.display='';
  document.getElementById('vue-randos').style.display='none';
  document.getElementById('vue-rando').style.display='none';
}

function showRandos(categorie) {
  catCourante = data.find(g => g.categorie === categorie);
  if (!catCourante) return;
  document.getElementById('vue-categories').style.display='none';
  document.getElementById('vue-randos').style.display='';
  document.getElementById('vue-rando').style.display='none';
  document.getElementById('randos-titre').textContent = catCourante.label;

  document.getElementById('randos-list').innerHTML = catCourante.randos
    .sort((a,b) => b.date.localeCompare(a.date))
    .map((r,i) => `
      <div class="rando-card" onclick="showRando(${i})" style="display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid #eee;cursor:pointer;background:#fff">
        <div style="text-align:center;min-width:36px;flex-shrink:0">
          <div style="font-size:20px;font-weight:600;color:#1a1a18;line-height:1">${parseInt(r.date.split('-')[2])}</div>
          <div style="font-size:10px;color:#aaa;text-transform:uppercase">${['jan.','fév.','mars','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'][parseInt(r.date.split('-')[1])-1]}</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.intitule}</div>
          <div style="font-size:11px;color:#888;margin-top:3px">${r.distance_km} km · ${r.denivele_m} m · ${badgeHtml(r.difficulte)} · ${r.participants} participants</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0">
          ${r.album_url ? '<i class="ti ti-photo" style="font-size:14px;color:#1D9E75"></i>' : ''}
          <i class="ti ti-chevron-right" style="font-size:16px;color:#ccc"></i>
        </div>
      </div>
    `).join('');
}

function showRando(idx) {
  const r = catCourante.randos.sort((a,b) => b.date.localeCompare(a.date))[idx];
  document.getElementById('vue-randos').style.display='none';
  document.getElementById('vue-rando').style.display='flex';
  document.getElementById('rando-back-label').textContent = catCourante.label;
  document.getElementById('rando-back-btn').onclick = () => showRandos(catCourante.categorie);
  document.getElementById('rando-titre-bar').textContent = r.intitule;

  const dateStr = fmtDate(r.date);
  document.getElementById('rando-detail-hero').innerHTML = `
    <div style="font-size:11px;font-weight:500;color:#1D9E75;margin-bottom:4px">${dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</div>
    <div style="font-size:16px;font-weight:600;color:#085041;line-height:1.3;margin-bottom:6px">${r.intitule}</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      ${badgeHtml(r.difficulte)}
      <span style="font-size:12px;color:#666"><i class="ti ti-users" style="font-size:13px;vertical-align:-2px"></i> ${r.participants} participants</span>
      <span style="font-size:12px;color:#666"><i class="ti ti-user" style="font-size:13px;vertical-align:-2px"></i> ${r.animateur}</span>
    </div>
  `;

  document.getElementById('rando-stats').innerHTML = `
    <div class="stat-box"><div class="stat-val">${r.distance_km} km</div><div class="stat-lbl">distance</div></div>
    <div class="stat-box"><div class="stat-val">${r.denivele_m} m</div><div class="stat-lbl">dénivelé</div></div>
    <div class="stat-box"><div class="stat-val">${r.participants}</div><div class="stat-lbl">participants</div></div>
  `;

  document.getElementById('rando-resume').textContent = r.resume || '';

  document.getElementById('rando-iframe').src = r.umap_url;
  document.getElementById('rando-umap-link').href = r.umap_url;

  const albumBtn = document.getElementById('rando-album-link');
  if (r.album_url) {
    albumBtn.href = r.album_url;
    albumBtn.style.display = 'flex';
  } else {
    albumBtn.style.display = 'none';
  }
}

init();
</script>
</body>
</html>
